<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Guides — Cyber Safety Guy</title>
  <link rel="canonical" href="https://guides.cybersafetyguy.com/">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">

  <style>
    /* Safety Checker Styles */
    .checker-wrap { max-width: 800px; margin: 0 auto 40px auto; padding: 0 20px; }
    .checker-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 25px; text-align: center; backdrop-filter: blur(10px); }
    .checker-input { width: 100%; max-width: 500px; padding: 15px; background: rgba(0,0,0,0.3); border: 2px solid #38bdf8; border-radius: 8px; color: white; font-size: 1.1rem; font-family: 'Exo 2', sans-serif; margin-top: 15px; outline: none; }
    .checker-result { display: none; margin-top: 25px; background: #ffffff; border-radius: 12px; padding: 25px; text-align: left; animation: slideDown 0.3s ease-out; }
    .checker-result h2, .checker-result p, .checker-result strong { color: #0f172a !important; }
    .checker-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; }
    .danger-bg { background: #fee2e2; color: #991b1b !important; }
    .caution-bg { background: #ffedd5; color: #9a3412 !important; }
    .checker-btn { display: inline-block; margin-top: 15px; padding: 12px 24px; background: #0f172a; color: #fff !important; text-decoration: none; border-radius: 6px; font-weight: 600; cursor: pointer; border:none; }
    
    /* Request Form Styles */
    .request-section { background: rgba(56, 189, 248, 0.05); padding: 60px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }
    .request-form { max-width: 500px; margin: 30px auto; display: flex; flex-direction: column; gap: 15px; }
    .form-input { padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-family: 'Exo 2', sans-serif; }
    .submit-btn { padding: 15px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
    .submit-btn:hover { transform: scale(1.02); }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <nav class="jump-nav">
    <a href="https://www.cybersafetyguy.com" class="jump-nav-home"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</a>
    <a href="#platform-guides">📱 Guides</a>
    <a href="#request-guide">📩 Request New</a>
  </nav>

  <header class="site-header">
    <img src="images/CSG_logo.png" alt="Logo" class="site-logo">
    <h1>FREE <span>GUIDES</span></h1>
    <div class="guide-count-badge"><strong id="totalCount">0</strong> free guides available</div>
  </header>

  <main class="main">

    <!-- APP SAFETY CHECKER -->
    <section class="checker-wrap">
        <div class="checker-card">
            <h2 style="font-family: 'Orbitron', sans-serif; font-size: 1.4rem; margin: 0;">APP SAFETY CHECKER</h2>
            <input type="text" id="checkerInput" class="checker-input" placeholder="Type app name (e.g. Roblox)..." onkeyup="runChecker()">
            
            <div id="checkerResult" class="checker-result">
                <div id="checkBadge" class="checker-badge"></div>
                <h2 id="checkName"></h2>
                <p id="checkTip"></p>
                <a id="checkLink" href="#" class="checker-btn">View Guide Below ↓</a>
            </div>

            <p id="noCheckResult" style="display:none; margin-top:20px; font-size:0.9rem;">
                Don't see that app? <a href="#request-guide" style="color:#38bdf8;">Request a guide here →</a>
            </p>
        </div>
    </section>

    <div class="search-wrap">
      <input type="text" class="search-input" id="guideSearch" placeholder="Search categories...">
    </div>

    <!-- GUIDE GRIDS -->
    <section class="category-section" id="platform-guides">
      <div class="category-header"><h2>Platform Guides</h2></div>
      <div class="guide-grid" id="grid-platform-guides"></div>
    </section>

    <!-- REQUEST SECTION -->
    <section class="request-section" id="request-guide">
        <h2 style="font-family: 'Orbitron', sans-serif;">MISSING AN APP?</h2>
        <p>Tell me which app or online risk I should audit next.</p>
        
        <form action="https://formspree.io/f/meeneedd" method="POST" class="request-form">
            <input type="text" name="app_name" class="form-input" placeholder="App Name (e.g. Lemon8, BeReal)" required>
            <input type="email" name="email" class="form-input" placeholder="Your Email (Optional - to be notified)" >
            <button type="submit" class="submit-btn">SEND REQUEST</button>
        </form>
    </section>

  </main>

  <script>
    // ... (Keep your loadGuides, updateStats, and Search Logic from previous version) ...

    const appDb = {
        "tiktok": { name: "TikTok", age: "13+", status: "danger", tip: "High risk of inappropriate content. Use 'Family Pairing'.", link: "#" },
        "roblox": { name: "Roblox", age: "10+", status: "caution", tip: "Risks in private servers and unmoderated chat.", link: "#" },
        "snapchat": { name: "Snapchat", age: "13+", status: "danger", tip: "Snap Map and disappearing messages are high-risk.", link: "#" }
        // Add all 10 here...
    };

    function runChecker() {
        const val = document.getElementById('checkerInput').value.toLowerCase().trim();
        const res = document.getElementById('checkerResult');
        const noRes = document.getElementById('noCheckResult');
        const openBtn = document.getElementById('checkLink');

        if (val === "") { res.style.display = "none"; noRes.style.display = "none"; return; }

        if (appDb[val]) {
            res.style.display = "block";
            noRes.style.display = "none";
            const app = appDb[val];
            document.getElementById('checkBadge').innerText = app.status === 'danger' ? '⚠️ High Risk' : '🟡 Caution';
            document.getElementById('checkBadge').className = 'checker-badge ' + app.status + '-bg';
            document.getElementById('checkName').innerText = app.name;
            document.getElementById('checkTip').innerText = app.tip;

            const cards = document.querySelectorAll('.guide-card');
            let matchedCard = null;
            cards.forEach(card => {
                if (card.querySelector('h3').innerText.toLowerCase().includes(val)) matchedCard = card;
            });

            if (matchedCard) {
                openBtn.onclick = (e) => {
                    e.preventDefault();
                    matchedCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    matchedCard.style.outline = "4px solid #38bdf8";
                    setTimeout(() => { matchedCard.style.outline = "none"; }, 2000);
                };
            }
        } else {
            res.style.display = "none";
            noRes.style.display = "block";
        }
    }
  </script>
</body>
</html>
