<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Guides — Cyber Safety Guy</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="top-bar"></div>
  <nav class="jump-nav">
    <button class="menu-toggle" onclick="toggleMenu()">Menu ☰</button>
    <div class="nav-links" id="navLinks">
      <a href="#platform-guides">📱 Platforms</a>
      <a href="#online-risks">🧠 Risks</a>
      <a href="#parental-controls">🛡️ Controls</a>
      <a href="#further-resources">📁 Resources</a>
      <a href="#request-guide">📩 Request</a>
    </div>
  </nav>

  <header class="site-header">
    <img src="images/CSG_logo.png" alt="Logo" class="site-logo">
    <h1>FREE <span>GUIDES</span></h1>
    <div class="guide-count-badge"><strong id="totalCount">0</strong> available</div>
    <div class="page-nav">
      <a class="page-nav-btn active">📄 Guides</a>
      <a href="presentations.html" class="page-nav-btn">🎬 Presentations</a>
      <a href="social.html" class="page-nav-btn">📡 Social</a>
    </div>
  </header>

  <main class="main">
    <section id="platform-guides" class="category-section">
        <h2>Platform Guides <span id="count-platform-guides" class="badge">0</span></h2>
        <div class="guide-grid" id="grid-platform-guides"></div>
    </section>

    <section id="online-risks" class="category-section">
        <h2>Online Risks <span id="count-online-risks" class="badge">0</span></h2>
        <div class="guide-grid" id="grid-online-risks"></div>
    </section>

    <section id="parental-controls" class="category-section">
        <h2>Parental Controls <span id="count-parental-controls" class="badge">0</span></h2>
        <div class="guide-grid" id="grid-parental-controls"></div>
    </section>

    <section id="further-resources" class="category-section">
        <h2>Further Resources <span id="count-further-resources" class="badge">0</span></h2>
        <div class="guide-grid" id="grid-further-resources"></div>
    </section>
  </main>

  <script>
    async function loadGuides() {
      const response = await fetch('guides.json');
      const guides = await response.json();
      guides.forEach(guide => {
        const grid = document.getElementById(`grid-${guide.id}`);
        if (grid) {
          grid.insertAdjacentHTML('beforeend', `
            <a href="${guide.link}" target="_blank" class="guide-card">
              <div class="card-img-wrap"><img src="images/${guide.image}"></div>
              <div class="card-content"><h3>${guide.title}</h3><p>${guide.desc}</p></div>
            </a>`);
        }
      });
      updateStats();
    }
    function updateStats() {
      const ids = ['platform-guides', 'online-risks', 'parental-controls', 'further-resources'];
      let total = 0;
      ids.forEach(id => {
        const count = document.getElementById(`grid-${id}`).children.length;
        total += count;
        document.getElementById(`count-${id}`).textContent = count;
      });
      document.getElementById('totalCount').textContent = total;
    }
    function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }
    loadGuides();
  </script>
</body>
</html>
