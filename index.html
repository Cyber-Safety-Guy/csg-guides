<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Guides — Cyber Safety Guy</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .checker-wrap { max-width: 800px; margin: 0 auto 40px auto; padding: 0 20px; }
    .checker-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 25px; text-align: center; backdrop-filter: blur(10px); }
    .checker-input { width: 100%; max-width: 500px; padding: 15px; background: rgba(0,0,0,0.3); border: 2px solid #38bdf8; border-radius: 8px; color: white; font-size: 1.1rem; margin-top: 15px; outline: none; }
    .checker-result { display: none; margin-top: 25px; background: #ffffff; border-radius: 12px; padding: 25px; text-align: left; }
    .checker-result h2, .checker-result p { color: #0f172a !important; }
    .checker-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; }
    .danger-bg { background: #fee2e2; color: #991b1b !important; }
    .caution-bg { background: #ffedd5; color: #9a3412 !important; }
    .request-section { background: rgba(56, 189, 248, 0.05); padding: 60px 20px; text-align: center; margin-top: 50px; border-radius: 16px; }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <nav class="jump-nav">
    <a href="https://www.cybersafetyguy.com" class="jump-nav-home"><svg viewBox="0 0 24 24" width="20"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</a>
    <button class="menu-toggle" onclick="toggleMenu()">Menu ☰</button>
    <div class="nav-links" id="navLinks">
      <a href="#platform-guides">📱 Platform Guides</a>
      <a href="#online-risks">🧠 Online Risks</a>
      <a href="#parental-controls">🛡️ Parental Controls</a>
      <a href="#further-resources">📁 Further Resources</a>
      <a href="#request-guide">📩 Request New</a>
    </div>
  </nav>

  <header class="site-header">
    <img src="images/CSG_logo.png" alt="Logo" class="site-logo">
    <h1>FREE <span>GUIDES</span></h1>
    <div class="guide-count-badge"><strong id="totalCount">0</strong> free guides</div>
    <div class="page-nav">
      <a class="page-nav-btn active">📄 Free Guides</a>
      <a href="presentations.html" class="page-nav-btn go">🎬 Presentations</a>
      <a href="social.html" class="page-nav-btn go">📡 Social</a>
    </div>
  </header>

  <main class="main">
    <section class="checker-wrap">
        <div class="checker-card">
            <h2>APP SAFETY CHECKER</h2>
            <input type="text" id="checkerInput" class="checker-input" placeholder="Type app name..." onkeyup="runChecker()">
            <div id="checkerResult" class="checker-result">
                <div id="checkBadge" class="checker-badge"></div>
                <h2 id="checkName"></h2>
                <p><strong>Age Rating:</strong> <span id="checkAge"></span></p>
                <p id="checkTip"></p>
                <button id="checkLink" class="checker-btn">View Guide ↓</button>
            </div>
        </div>
    </section>

    <section class="category-section" id="platform-guides">
      <div class="category-header"><span class="category-icon">📱</span><h2 class="category-title">Platform Guides</h2><span class="category-count" id="count-platform-guides">0 guides</span></div>
      <div class="guide-grid" id="grid-platform-guides"></div>
    </section>

    <section class="category-section" id="further-resources">
      <div class="category-header"><span class="category-icon">📁</span><h2 class="category-title">Further Resources</h2><span class="category-count" id="count-further-resources">0 guides</span></div>
      <div class="guide-grid" id="grid-further-resources"></div>
    </section>

    <section class="request-section" id="request-guide">
        <form action="https://formspree.io/f/YOUR_ID" method="POST">
            <input type="text" name="app" placeholder="App Name" required>
            <button type="submit">SEND REQUEST</button>
        </form>
    </section>
  </main>

  <script>
    async function loadGuides() {
      const response = await fetch('guides.json');
      const guides = await response.json();
      guides.forEach(guide => {
        const grid = document.getElementById(`grid-${guide.id}`);
        if (grid) {
          grid.insertAdjacentHTML('beforeend', `<a href="${guide.link}" class="guide-card"><div class="card-img-wrap"><img src="images/${guide.image}"></div><h3>${guide.title}</h3></a>`);
        }
      });
      updateStats();
    }

    function updateStats() {
      const ids = ['platform-guides', 'online-risks', 'parental-controls', 'further-resources'];
      let total = 0;
      ids.forEach(id => {
        const grid = document.getElementById(`grid-${id}`);
        if (grid) {
          const count = grid.children.length;
          total += count;
          document.getElementById(`count-${id}`).textContent = count + ' guides';
        }
      });
      document.getElementById('totalCount').textContent = total;
    }

    function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }
    loadGuides();
  </script>
</body>
</html>
