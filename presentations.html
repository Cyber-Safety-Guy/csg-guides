<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentations — Cyber Safety Guy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <h1>PRESEN<span>TATIONS</span></h1>
    <div class="page-nav">
      <a href="index.html" class="page-nav-btn">📄 Guides</a>
      <a class="page-nav-btn active">🎬 Presentations</a>
      <a href="social.html" class="page-nav-btn">📡 Social</a>
    </div>
  </header>
  <main class="main">
    <div class="pres-grid" id="presGrid"></div>
  </main>
  <script>
    async function loadPresentations() {
      const response = await fetch('presentations.json');
      const data = await response.json();
      const grid = document.getElementById('presGrid');
      data.forEach(p => {
        grid.insertAdjacentHTML('beforeend', `
          <div class="pres-card">
            <div class="card-img-wrap"><img src="images/${p.image}"></div>
            <div class="card-content">
              <h3>${p.title}</h3>
              <p>${p.desc}</p>
              <a href="${p.link}" class="page-nav-btn go" style="display:block; margin-top:10px; text-align:center;">Watch Video</a>
            </div>
          </div>`);
      });
    }
    loadPresentations();
  </script>
</body>
</html>
